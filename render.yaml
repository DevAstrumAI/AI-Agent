services:
  - type: web
    name: functiomed-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: starter
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

  - type: worker
    name: functiomed-voice-agent
    runtime: docker
    dockerfilePath: ./Dockerfile.voiceagent
    plan: starter
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false