services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: functiomed-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

  # ── LiveKit Voice Agent ──────────────────────────────────────
  - type: web
    name: functiomed-voice-agent
    runtime: docker
    dockerfilePath: ./Dockerfile.voiceagent
    plan: free
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false